name: Run hashr node

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  run-node:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Start node
        run: |
          nohup uvicorn app.main:app --host 0.0.0.0 --port 8000 &
          sleep 5

      - name: Test endpoints
        run: |
          curl -f http://localhost:8000/health
          curl -f http://localhost:8000/manifest
          curl -f http://localhost:8000/capabilities
          curl -f http://localhost:8000/registry
          curl -f http://localhost:8000/pricing
          curl -f http://localhost:8000/payments
